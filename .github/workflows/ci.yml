name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Root dependencies
        run: npm install
      - name: Install Backend dependencies
        run: cd backend && npm install
      - name: Run Unit Tests
        run: npx jest

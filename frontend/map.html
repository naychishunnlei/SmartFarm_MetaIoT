<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm System - Thailand Map</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo h1 {
            color: white;
            margin: 0;
            font-size: 1.8rem;
        }

        .map-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1rem;
        }

        .map-title {
            color: white;
            font-size: 2.5rem;
            margin: 0;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #map {
            width: min(90vw, 980px);
            height: min(68vh, 680px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .map-status {
            color: #ffffff;
            font-size: 0.95rem;
            text-align: center;
            min-height: 1.4rem;
        }

        .map-status.error {
            color: #ffd1d1;
        }

        .leaflet-popup-content {
            font-family: 'Poppins', sans-serif;
        }

        .map-actions {
            display: flex;
            gap: 0.5rem;
        }

        .map-action-btn {
            border: none;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-weight: 600;
            background: #ffffff;
            color: #333333;
        }

        .map-action-btn.active {
            background: #ffd54f;
        }

        .footer {
            text-align: center;
            padding: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Farmverse</h1>
        </div>
        <div class="nav">
            <div class="map-actions">
                <button id="add-farm-mode-btn" class="map-action-btn" type="button">Add New Farm Location</button>
            </div>
        </div>
    </div>

    <div class="map-container">
        <h1 class="map-title">Select Your Farm Location</h1>
        <div id="map" aria-label="Thailand farm map"></div>
        <div id="map-status" class="map-status">Loading real farm coordinates from API...</div>
    </div>

    <div class="footer">
        <p>🌾 Smart Farm MetaIoT System - Choose your location to begin farming in the metaverse</p>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script type="module">

        import { getFarmsForUser, getOrCreateFarm, createFarm, deleteFarm } from './src/apiService.js'

        const THAILAND_BOUNDS = [
            [5.5, 97.2],
            [20.7, 106.2]
        ];

        const FARM_SEEDS = [
            { label: 'Bangkok Farm', query: 'Bangkok, Thailand', desc: 'Central region smart farm' },
            { label: 'Chiang Mai Farm', query: 'Chiang Mai, Thailand', desc: 'Northern mountain farm' },
            { label: 'Phuket Farm', query: 'Phuket, Thailand', desc: 'Southern island farm' },
            { label: 'Khon Kaen Farm', query: 'Khon Kaen, Thailand', desc: 'Northeast rice farm' },
            { label: 'Ayutthaya Farm', query: 'Ayutthaya, Thailand', desc: 'Historical region farm' }
        ];

        const FALLBACK_COORDS = {
            'Bangkok Farm': { lat: 13.7563, lon: 100.5018 },
            'Chiang Mai Farm': { lat: 18.7883, lon: 98.9853 },
            'Phuket Farm': { lat: 7.8804, lon: 98.3923 },
            'Khon Kaen Farm': { lat: 16.4419, lon: 102.8350 },
            'Ayutthaya Farm': { lat: 14.3532, lon: 100.5689 }
        };

        const SEED_LABELS = new Set(FARM_SEEDS.map((s) => s.label));
        const HIDDEN_SEEDS_KEY = 'farmverseHiddenSeedFarms';

        function getHiddenSeedLabels() {
            try {
                const raw = localStorage.getItem(HIDDEN_SEEDS_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function hideSeedFarmLabel(label) {
            if (!SEED_LABELS.has(label)) return;
            const set = new Set(getHiddenSeedLabels());
            set.add(label);
            localStorage.setItem(HIDDEN_SEEDS_KEY, JSON.stringify([...set]));
        }

        const mapStatus = document.getElementById('map-status');
        const addFarmModeBtn = document.getElementById('add-farm-mode-btn');
        let addFarmMode = false;
        const map = L.map('map', {
            minZoom: 5,
            maxZoom: 12
        });

        map.fitBounds(THAILAND_BOUNDS);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        L.rectangle(THAILAND_BOUNDS, {
            color: '#5cd65c',
            weight: 1,
            fillOpacity: 0.05
        }).addTo(map);

        function setStatus(message, isError = false) {
            mapStatus.textContent = message;
            mapStatus.classList.toggle('error', isError);
        }

        async function geocodeFarm(seed) {
            const url = new URL('https://nominatim.openstreetmap.org/search');
            url.searchParams.set('q', seed.query);
            url.searchParams.set('format', 'jsonv2');
            url.searchParams.set('limit', '1');
            url.searchParams.set('countrycodes', 'th');

            const response = await fetch(url.toString(), {
                headers: {
                    Accept: 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`Geocode failed with status ${response.status}`);
            }

            const results = await response.json();
            if (!results.length) {
                throw new Error(`No result for ${seed.query}`);
            }

            return {
                ...seed,
                lat: Number(results[0].lat),
                lon: Number(results[0].lon)
            };
        }

        function buildFarmRecord(seed, coords) {
            return {
                name: seed.label,
                desc: seed.desc,
                lat: coords.lat,
                lon: coords.lon
            };
        }

        function normalizeFarmRecord(farm) {
            return {
                ...farm,
                latitude: Number(farm.latitude),
                longitude: Number(farm.longitude)
            };
        }

        function addFarmMarker(farmSeed, existingFarm = null) {
            const { label, desc } = farmSeed;
            const coords = existingFarm ? { lat: existingFarm.latitude, lon: existingFarm.longitude } : FALLBACK_COORDS[label];
            
            const marker = L.marker([coords.lat, coords.lon]).addTo(map);
            
            // Create a unique ID or class for the button to avoid selection issues
            const btnId = `btn-${label.replace(/\s+/g, '-')}`;
            
            const deleteBtnId = `delete-${label.replace(/\s+/g, '-')}-${existingFarm ? existingFarm.id : 'seed'}`;
            let popupContent = `
                <strong>${label} ${existingFarm ? '(My Farm)' : ''}</strong><br>
                ${desc}<br><br>
                <button type="button" id="${btnId}" class="select-farm-btn">
                    ${existingFarm ? 'Go to this farm' : 'Select this location'}
                </button>
                <br><br>
                <button type="button" id="${deleteBtnId}" class="select-farm-btn" style="background:#f44336;">Delete farm</button>
            `;
            
            marker.bindPopup(popupContent);

            marker.on('popupopen', () => {
                const button = document.getElementById(btnId);
                const deleteButton = document.getElementById(deleteBtnId);

                button.onclick = async () => {
                    setStatus(`Processing ${label}...`);
                    try {
                        let farmFromDb;
                        if (existingFarm) {
                            farmFromDb = existingFarm;
                        } else {
                            // Pass the 'desc' as the 'location' field
                            farmFromDb = await getOrCreateFarm({ 
                                name: label, 
                                lat: coords.lat, 
                                lon: coords.lon,
                                location: desc // This maps to the 'desc' in your FARM_SEEDS array
                            });
                        }

                        localStorage.setItem('selectedFarmId', farmFromDb.id);
                        localStorage.setItem('selectedFarm', JSON.stringify(farmFromDb));

                        setStatus('Redirecting to your 3D farm...');
                        window.location.href = 'farm.html';
                    } catch (error) {
                        console.error('Failed to process farm:', error);
                        setStatus(error.message, true);
                    }
                };

                deleteButton.onclick = async () => {
                    const msg = existingFarm
                        ? `Delete "${label}"? This removes all objects in this farm from the server.`
                        : `Remove "${label}" from the map? (Preset locations stay hidden until you clear browser data.)`;
                    if (!confirm(msg)) return;

                    try {
                        if (existingFarm) {
                            await deleteFarm(existingFarm.id);
                            const selectedFarmId = localStorage.getItem('selectedFarmId');
                            if (selectedFarmId && Number(selectedFarmId) === Number(existingFarm.id)) {
                                localStorage.removeItem('selectedFarmId');
                                localStorage.removeItem('selectedFarm');
                            }
                        }
                        hideSeedFarmLabel(label);
                        map.removeLayer(marker);
                        setStatus(`Removed ${label}.`);
                    } catch (error) {
                        console.error('Failed to delete farm:', error);
                        setStatus(error.message, true);
                    }
                };
            });
        }

        async function addCustomFarmAt(latlng) {
            const name = prompt('Enter a name for the new farm location:');
            if (!name) return;

            const location = prompt('Enter short location/description:', 'Custom farm location') || 'Custom farm location';

            setStatus('Creating your new farm...');
            try {
                const createdFarm = await createFarm({
                    name: name.trim(),
                    lat: latlng.lat,
                    lon: latlng.lng,
                    location: location.trim()
                });

                const normalizedFarm = normalizeFarmRecord(createdFarm);
                addFarmMarker(
                    { label: normalizedFarm.name, desc: normalizedFarm.location || 'Custom farm location' },
                    normalizedFarm
                );

                setStatus(`Created "${normalizedFarm.name}". Click its marker to enter the farm.`);
            } catch (error) {
                console.error('Failed to create farm:', error);
                setStatus(error.message, true);
            }
        }
         async function loadAndDisplayFarms() {
            setStatus('Loading your farms...');
            try {
                // 4. Use the imported getFarmsForUser function
                const myFarms = await getFarmsForUser();
                const normalizedFarms = myFarms.map(normalizeFarmRecord);
                const existingNames = new Set(normalizedFarms.map((farm) => farm.name));
                const hiddenSeeds = new Set(getHiddenSeedLabels());

                // Render all farms that already exist in DB (including custom ones)
                normalizedFarms.forEach((farm) => {
                    addFarmMarker(
                        {
                            label: farm.name,
                            desc: farm.location || 'Custom farm location'
                        },
                        farm
                    );
                });

                // Render default seeds that user has not created yet and has not removed from map
                FARM_SEEDS.forEach((seed) => {
                    if (!existingNames.has(seed.label) && !hiddenSeeds.has(seed.label)) {
                        addFarmMarker(seed, null);
                    }
                });

                setStatus('Select a farm location or go to one of your existing farms.');

            } catch (error) {
                console.error('Failed to load farms:', error);
                setStatus(error.message, true);
                 if (error.message.includes('not logged in')) {
                    setTimeout(() => window.location.href = 'index.html', 2000);
                }
            }
        }

        window.addEventListener('load', () => {
            if (!localStorage.getItem('farmverseToken')) {
                setStatus('You must be logged in. Redirecting...', true);
                setTimeout(() => { window.location.href = 'index.html'; }, 2500);
            } else {
                loadAndDisplayFarms();
            }
        });

        addFarmModeBtn.addEventListener('click', () => {
            addFarmMode = !addFarmMode;
            addFarmModeBtn.classList.toggle('active', addFarmMode);

            if (addFarmMode) {
                setStatus('Add mode enabled: click on map to create a new farm location.');
            } else {
                setStatus('Select a farm location or go to one of your existing farms.');
            }
        });

        map.on('click', (event) => {
            if (!addFarmMode) return;
            addCustomFarmAt(event.latlng);
        });
